<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AttendPro | DTU CE SEC-1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.container{
    width:420px;
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.logo{
    width:70px;
    margin-bottom:10px;
}

h2{
    margin:5px 0;
}

.subtitle{
    font-size:13px;
    opacity:0.8;
    margin-bottom:15px;
}

select,input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.progress-container{
    margin:20px auto;
    width:150px;
    height:150px;
    position:relative;
}

.progress-circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:conic-gradient(#00ffcc 0deg, #444 0deg);
    display:flex;
    justify-content:center;
    align-items:center;
}

.progress-circle span{
    position:absolute;
    font-size:20px;
    font-weight:bold;
}

.dashboard{
    margin-top:15px;
    font-size:14px;
    text-align:left;
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

#tutorialOption{
    display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔵 DTU LOGO (Public link) -->
<img class="logo" src="https://upload.wikimedia.org/wikipedia/en/9/9d/Delhi_Technological_University_logo.png">

<h2>AttendPro</h2>
<div class="subtitle">Attendance System only for DTU CE SEC-1</div>

<select id="subject" onchange="checkTutorial()">
<option value="">Select Subject</option>
<option value="CO">CO</option>
<option value="Maths">Maths</option>
<option value="Stats">Stats</option>
<option value="VAC">VAC</option>
<option value="Graphics">Graphics</option>
<option value="MOS">MOS</option>
</select>

<div id="tutorialOption">
<select id="tutorial">
<option value="no">Exclude Tutorial</option>
<option value="yes">Include Tutorial</option>
</select>
</div>

<input type="number" id="leaves" placeholder="Total Leaves Taken">

<button onclick="calculate()">Calculate Attendance</button>

<div class="progress-container">
<div class="progress-circle" id="progressCircle">
<span id="progressText">0%</span>
</div>
</div>

<div class="dashboard" id="dashboard">
Subject summary will appear here.
</div>

</div>

<script>

// 🔵 Semester Start
const semesterStart = new Date("2026-01-05");

// 🔵 Timetable
const timetable = {
1:{MOS:2,CO:2},
2:{Graphics:1},
3:{Stats:1,Maths:2,MOS:1},
4:{Stats:2,Maths:1,VAC:2},
5:{CO:1,Stats:1}
};

function checkTutorial(){
let subject=document.getElementById("subject").value;
document.getElementById("tutorialOption").style.display=
(subject==="Maths"||subject==="Stats")?"block":"none";
}

function calculate(){

let subject=document.getElementById("subject").value;
let leaves=parseInt(document.getElementById("leaves").value);
let tutorial=document.getElementById("tutorial").value;

if(!subject||isNaN(leaves)||leaves<0){
alert("Enter valid details");
return;
}

let today=new Date();
let totalClasses=0;

for(let d=new Date(semesterStart);d<=today;d.setDate(d.getDate()+1)){

let day=d.getDay();
if(day===0||day===6) continue;

if(timetable[day] && timetable[day][subject]){
totalClasses+=timetable[day][subject];
}

if((subject==="Maths"||subject==="Stats") && tutorial==="yes"){
if(day===3) totalClasses+=1;
}
}

let attended=totalClasses-leaves;
if(attended<0) attended=0;

let percentage=(totalClasses>0)?
((attended/totalClasses)*100).toFixed(1):0;

// 🔵 Animate Circular Progress
let circle=document.getElementById("progressCircle");
let text=document.getElementById("progressText");

let deg=percentage*3.6;
circle.style.background=
`conic-gradient(#00ffcc ${deg}deg,#444 ${deg}deg)`;

text.innerText=percentage+"%";

// 🔵 Dashboard Summary
let maxLeaves=Math.floor(totalClasses*0.25);
let moreBunk=maxLeaves-leaves;

document.getElementById("dashboard").innerHTML=`
<b>Total Classes:</b> ${totalClasses}<br>
<b>Attended:</b> ${attended}<br>
<b>Leaves Taken:</b> ${leaves}<br>
<b>Safe Bunks Left:</b> ${moreBunk>=0?moreBunk:0}
`;
}

</script>

</body>
</html>
